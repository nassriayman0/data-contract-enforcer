version: 2

models:
  - name: stg_orders
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        data_type: int
      - name: customer_id
        data_type: int
      - name: order_date
        data_type: date
      - name: order_status_typo # A red rabbit in the data contract, should be order_status
        data_type: varchar